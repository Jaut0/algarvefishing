<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Teste Registo Cliente</title>
    <link rel="stylesheet" href="css/algarve-tuna.css">
    <link rel="stylesheet" href="css/wicked-tuna.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            padding: 2rem;
            background: linear-gradient(135deg, #0A1628, #1565C0);
            min-height: 100vh;
        }
        
        .teste-card {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #FF6B35;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .log {
            background: #0A1628;
            color: #10B981;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log p {
            margin: 0.25rem 0;
        }
        
        .sucesso {
            color: #10B981;
        }
        
        .erro {
            color: #EF4444;
        }
        
        .info {
            color: #3B82F6;
        }
    </style>
</head>
<body>
    <div class="teste-card">
        <h1>🧪 Teste de Registo - Cliente Particular</h1>
        
        <form id="formTesteRegistar">
            <div class="form-grupo">
                <label class="form-label obrigatorio">Nome Completo</label>
                <input type="text" id="nome" class="form-input" value="João Teste" required>
            </div>
            
            <div class="form-grupo">
                <label class="form-label obrigatorio">Email</label>
                <input type="email" id="email" class="form-input" value="joao@teste.com" required>
            </div>
            
            <div class="form-grupo">
                <label class="form-label obrigatorio">Telefone</label>
                <input type="tel" id="telefone" class="form-input" value="+351 912 345 678" required>
            </div>
            
            <div class="form-grupo">
                <label class="form-label obrigatorio">Password</label>
                <input type="password" id="password" class="form-input" required>
            </div>
            
            <div class="form-grupo">
                <label class="form-label obrigatorio">Confirmar Password</label>
                <input type="password" id="passwordConfirm" class="form-input" required>
            </div>
            
            <button type="submit" class="btn btn-primario btn-bloco btn-grande">
                <i class="fas fa-user-plus"></i> Registar Cliente
            </button>
        </form>
        
        <div class="log" id="log">
            <p class="info">📝 Logs aparecerão aqui...</p>
        </div>
        
        <div style="margin-top: 2rem; padding: 1rem; background: rgba(59, 130, 246, 0.1); border-radius: 8px;">
            <h3 style="color: #3B82F6; margin-bottom: 1rem;">📋 Instruções:</h3>
            <ol style="margin-left: 1.5rem; line-height: 2;">
                <li>Campos já estão preenchidos automaticamente</li>
                <li>Clique "Registar Cliente"</li>
                <li>Veja os logs abaixo</li>
                <li>Se sucesso → vá para <a href="auth.html">auth.html</a> e tente lá</li>
            </ol>
        </div>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        const logDiv = document.getElementById('log');
        
        function addLog(mensagem, tipo = 'info') {
            const p = document.createElement('p');
            p.className = tipo;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${mensagem}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(mensagem);
        }
        
        document.getElementById('formTesteRegistar').addEventListener('submit', (e) => {
            e.preventDefault();
            
            addLog('🚀 Iniciando registo...', 'info');
            
            try {
                // 1. Recolher dados
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim();
                const telefone = document.getElementById('telefone').value.trim();
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('passwordConfirm').value;
                
                addLog(`📝 Nome: ${nome}`, 'info');
                addLog(`📧 Email: ${email}`, 'info');
                addLog(`📞 Telefone: ${telefone}`, 'info');
                
                // 2. Validações
                if (!nome || !email || !telefone || !password) {
                    addLog('❌ ERRO: Campos obrigatórios vazios!', 'erro');
                    mostrarToast('❌ Por favor, preencha todos os campos!', 'erro');
                    return;
                }
                
                addLog('✅ Campos obrigatórios OK', 'sucesso');
                
                if (password !== passwordConfirm) {
                    addLog('❌ ERRO: Passwords não coincidem!', 'erro');
                    mostrarToast('❌ As passwords não coincidem!', 'erro');
                    return;
                }
                
                addLog('✅ Passwords coincidem', 'sucesso');
                
                if (password.length < 6) {
                    addLog('❌ ERRO: Password muito curta!', 'erro');
                    mostrarToast('❌ A password deve ter pelo menos 6 caracteres!', 'erro');
                    return;
                }
                
                addLog('✅ Password válida (>= 6 chars)', 'sucesso');
                
                // 3. Gerar token
                const tokenConfirmacao = 'TOKEN_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                addLog(`🔑 Token gerado: ${tokenConfirmacao}`, 'info');
                
                // 4. Criar utilizador
                const novoUtilizador = {
                    id: 'USER_' + Date.now(),
                    nome: nome,
                    email: email,
                    telefone: telefone,
                    password: password,
                    tipo: 'privado',
                    status: 'pendente_confirmacao',
                    emailConfirmado: false,
                    tokenConfirmacao: tokenConfirmacao,
                    dataCriacao: new Date().toISOString()
                };
                
                addLog('👤 Objeto utilizador criado:', 'sucesso');
                addLog(JSON.stringify(novoUtilizador, null, 2), 'info');
                
                // 5. Guardar no localStorage
                let utilizadores = JSON.parse(localStorage.getItem('utilizadores') || '[]');
                addLog(`💾 Utilizadores existentes: ${utilizadores.length}`, 'info');
                
                utilizadores.push(novoUtilizador);
                localStorage.setItem('utilizadores', JSON.stringify(utilizadores));
                
                addLog(`💾 Utilizador guardado! Total agora: ${utilizadores.length}`, 'sucesso');
                
                // 6. Gerar link de confirmação
                const linkConfirmacao = `${window.location.origin}/confirmar-email.html?token=${tokenConfirmacao}`;
                addLog(`🔗 Link: ${linkConfirmacao}`, 'info');
                
                // 7. Simular email
                let emailsSimulados = JSON.parse(localStorage.getItem('emailsSimulados') || '[]');
                const emailObj = {
                    id: 'EMAIL_' + Date.now(),
                    para: email,
                    assunto: '✅ Confirme o seu Email - FishingHub',
                    corpo: `Olá ${nome}! Clique aqui: ${linkConfirmacao}`,
                    dataEnvio: new Date().toISOString(),
                    lido: false
                };
                emailsSimulados.push(emailObj);
                localStorage.setItem('emailsSimulados', JSON.stringify(emailsSimulados));
                
                addLog('📧 Email simulado enviado', 'sucesso');
                
                // 8. Sucesso!
                addLog('', 'info');
                addLog('🎉🎉🎉 REGISTO COMPLETO COM SUCESSO! 🎉🎉🎉', 'sucesso');
                addLog('', 'info');
                addLog('📋 Próximos passos:', 'info');
                addLog('1. Copie o link acima', 'info');
                addLog('2. Abra em nova aba para confirmar email', 'info');
                addLog('3. Depois faça login em auth.html', 'info');
                
                mostrarToast('✅ Registo completo! Veja os logs abaixo.', 'sucesso');
                
                // Mostrar alert com link
                setTimeout(() => {
                    alert(`✅ Conta criada com sucesso!

📧 Email de confirmação "enviado" para:
${email}

🔗 Link de confirmação (copie e abra):
${linkConfirmacao}

Ou veja em: caixa-email.html`);
                }, 500);
                
            } catch (error) {
                addLog(`💥 ERRO CRÍTICO: ${error.message}`, 'erro');
                addLog(error.stack, 'erro');
                mostrarToast(`❌ Erro: ${error.message}`, 'erro');
            }
        });
        
        // Log inicial
        addLog('✅ Página carregada', 'sucesso');
        addLog('📝 Formulário pronto para teste', 'info');
        addLog('---', 'info');
    </script>
</body>
</html>
