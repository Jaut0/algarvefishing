<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Escolher Barco - Algarve Tuna Charter</title>
<link href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;⚓&lt;/text&gt;&lt;/svg&gt;" rel="icon"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<link href="css/wicked-tuna.css?v=1.43" rel="stylesheet"/>
<style>
        .barcos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        /* ===== BARCOS PÚBLICOS — fundo claro, texto legível ===== */
        .barco-card-pub {
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            border: 1px solid #E5E7EB;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .barco-card-pub:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.14);
        }
        .barco-card-pub-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .barco-card-pub-body { padding: 1.25rem 1.5rem 1.5rem; }
        .barco-card-pub-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        .barco-card-pub-nome {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0A1628;
            margin-bottom: 0.25rem;
        }
        .barco-card-pub-porto {
            font-size: 0.85rem;
            color: #6B7280;
        }
        .badge-aprovado {
            background: #D1FAE5;
            color: #065F46;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .barco-card-pub-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            background: #F9FAFB;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            margin: 0.75rem 0;
        }
        .spec {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: #374151;
        }
        .spec i { color: #FF8F00; width: 16px; }
        .barco-card-pub-capitao {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: #EFF6FF;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        .capitao-av {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0A1628, #1565C0);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .barco-card-pub-extras {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }
        .extra-tag {
            background: #FEF3C7;
            color: #92400E;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        /* Filtros */
        .filters-section {
            background: #fff;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #E5E7EB;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .filter-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #374151;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: #F9FAFB;
            border: 1.5px solid #D1D5DB;
            border-radius: 8px;
            color: #1F2937;
            font-size: 0.9rem;
        }
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #1565C0;
            outline: none;
        }
        .resultados-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            color: var(--wt-text);
            background: var(--wt-surface);
            border: 1px solid var(--wt-border);
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<!-- Header -->
<header class="header">
<div class="container">
<div class="header-content">
<a class="logo" href="index.html">
<i class="fas fa-anchor"></i>
<span>Algarve Tuna Charter</span>
</a>
<nav class="nav" id="mainNav">
<a href="index.html">Início</a>
<a href="explorar.html">Explorar</a>
<a class="active" href="escolher-barco.html">Reservar</a>
<a href="auth.html">Entrar</a>
<a class="btn btn-primary" href="auth.html">Registar</a>
</nav>
<button class="mobile-toggle" id="mobileToggle">
<i class="fas fa-bars"></i>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="main-content">
<section class="hero-small">
<div class="container">
<h1><i class="fas fa-ship"></i> Escolher Barco</h1>
<p>Selecione um barco e reserve os seus dias de pesca</p>
</div>
</section>
<section class="section">
<div class="container">
<!-- Filters -->
<div class="filters-section">
<h3><i class="fas fa-filter"></i> Filtrar Barcos</h3>
<div class="filters-grid">
<div class="filter-group">
<label for="filterLocal">Local / Porto</label>
<select id="filterLocal">
<option value="">Todos os locais</option>
<option value="vila real de santo antónio">Vila Real de Santo António</option>
<option value="monte gordo">Monte Gordo</option>
<option value="cabanas de tavira">Cabanas de Tavira</option>
<option value="tavira">Tavira (Rio Gilão)</option>
<option value="santa luzia">Santa Luzia (Capital do Polvo)</option>
<option value="fuseta">Fuseta</option>
<option value="olhão">Olhão (Porto de Pesca)</option>
<option value="faro">Faro (Marina de Faro)</option>
<option value="quarteira">Quarteira</option>
<option value="vilamoura">Vilamoura (Marina de Vilamoura)</option>
<option value="albufeira">Albufeira (Marina de Albufeira)</option>
<option value="armação de pêra">Armação de Pêra</option>
<option value="portimão">Portimão (Marina de Portimão)</option>
<option value="alvor">Alvor</option>
<option value="lagos">Lagos (Marina de Lagos)</option>
<option value="luz">Luz (Praia da Luz)</option>
<option value="burgau">Burgau</option>
<option value="salema">Salema</option>
<option value="baleeira">Baleeira (Sagres)</option>
</select>
</div>
<div class="filter-group">
<label for="filterTipo">Tipo de Barco</label>
<select id="filterTipo">
<option value="">Todos os tipos</option>
<option value="traineira">Traineira</option>
<option value="lancha">Lancha</option>
<option value="veleiro">Veleiro</option>
<option value="iate">Iate</option>
</select>
</div>
<div class="filter-group">
<label for="filterCapacidade">Capacidade Mínima</label>
<select id="filterCapacidade">
<option value="">Qualquer</option>
<option value="2">2+ pessoas</option>
<option value="4">4+ pessoas</option>
<option value="6">6+ pessoas</option>
<option value="8">8+ pessoas</option>
<option value="10">10+ pessoas</option>
</select>
</div>
<div class="filter-group">
<label for="filterOrdenar">Ordenar por</label>
<select id="filterOrdenar">
<option value="recente">Mais recente</option>
<option value="rating">Melhor avaliação</option>
<option value="capacidade">Maior capacidade</option>
</select>
</div>
</div>
</div>
<!-- Results Header -->
<div class="resultados-header">
<div class="resultados-count">
<strong id="countBarcos">12</strong> barcos disponíveis
                    </div>
</div>
<!-- Barcos Grid -->
<div class="barcos-grid" id="barcosGrid">
<!-- Barco cards will be loaded here by JavaScript -->
</div>
</div>
</section>
</main>
<!-- Footer -->
<footer class="footer">

</footer>
<script src="js/main.js"></script>
<script src="js/escolher-barco.js"></script>
<script>
    // Actualizar header quando utilizador está logado
    document.addEventListener('DOMContentLoaded', function() {
        try {
            const raw = localStorage.getItem('usuarioLogado');
            if (!raw) return;
            const usuario = JSON.parse(raw);
            if (!usuario || !usuario.email) return;
            const dashboardUrl = usuario.tipo === 'capitao' ? 'dashboard-capitao.html' : 'dashboard-usuario.html';
            document.querySelectorAll('a[href="auth.html"], a[href="./auth.html"]').forEach(btn => {
                if (btn.textContent.trim() === 'Entrar' || btn.textContent.trim() === 'Registar' || btn.textContent.trim() === 'Área Cliente') {
                    btn.textContent = '🔐 Dashboard';
                    btn.href = dashboardUrl;
                    if (btn.classList.contains('btn') || btn.classList.contains('btn-primary')) {
                        btn.style.background = 'linear-gradient(135deg, #FF8F00, #FFB74D)';
                        btn.style.border = '2px solid #FF8F00';
                        btn.style.color = '#fff';
                    }
                }
            });
        } catch(e) {}
    });
    </script>
<script src="js/i18n.js?v=1.43"></script>
</body>
</html>
